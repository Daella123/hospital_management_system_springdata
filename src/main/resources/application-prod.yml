spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hospital_db_prod}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  graphql:
    graphiql:
      enabled: false
    path: /graphql

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.daella.hospital_management_system: WARN
    root: ERROR
